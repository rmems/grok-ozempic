name: Aikido Security

on:
  pull_request:
    branches: [main, refactor-tests-docs]
  push:
    branches:
      - main
      - narrow-crest
      - refactor-tests-docs

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  aikido:
    name: Aikido Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Run Aikido CI API Client (Rust)
        if: ${{ env.AIKIDO_API_KEY != '' }}
        run: |
          npm install -g @aikidosec/ci-api-client@1.0.16
          aikido-api-client scan \
            "$REPO_ID" \
            "$BASE_SHA" \
            "$HEAD_SHA" \
            "$BRANCH_NAME" \
            --pull-request-title "$PR_TITLE" \
            --pull-request-url "$PR_URL" \
            --minimum-severity-level HIGH
        env:
          AIKIDO_API_KEY: ${{ secrets.AIKIDO_API_KEY }}
          REPO_ID: ${{ github.repository_id }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_URL: ${{ github.event.pull_request.html_url || '' }}
