name: Aikido Security

on:
  pull_request:
    branches: [main, refactor-tests-docs]
  push:
    branches:
      - main
      - narrow-crest
      - refactor-tests-docs

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  aikido:
    name: Aikido Security Scan
    runs-on: ubuntu-latest
    if: ${{ vars.AIKIDO_CI_KEY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run Aikido CI API Client
        run: |
          npm install -g @aikidosec/ci-api-client@1.0.16
          aikido-api-client apikey "$AIKIDO_CI_KEY"
          aikido-api-client scan \
            "${{ github.repository_id }}" \
            "${{ github.event.pull_request.base.sha || github.event.before }}" \
            "${{ github.sha }}" \
            "${{ github.head_ref || github.ref_name }}"
        env:
          AIKIDO_CI_KEY: ${{ vars.AIKIDO_CI_KEY }}
