name: Rust

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - narrow-crest

permissions:
  contents: read

jobs:
  check:
    name: fmt / clippy / test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        # rustfmt + clippy components are required for the explicit "Format" and "Clippy" steps below.
        # Without them, `cargo fmt` / `cargo clippy` subcommands are unavailable and the job fails
        # with exit 101 (this was the root cause of the PR #26 "fmt / clippy / test" failure).
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-targets --all-features

      - name: Build
        run: cargo build --all-targets --all-features

      - name: Rust doc
        run: cargo doc --no-deps --all-features
