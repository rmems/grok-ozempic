name: Codecov Coverage

on:
  pull_request:
    branches: [main, refactor-tests-docs]
  push:
    branches:
      - main
      - narrow-crest
      - refactor-tests-docs

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write          # Enables Codecov OIDC (tokenless)

jobs:
  coverage:
    name: Codecov Upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@c6d51ded7cde3c421f6cd6046cd601f2248f3710 # cargo-llvm-cov v0.6.0

      - name: Generate Code Coverage
        run: cargo llvm-cov --all-targets --all-features --workspace --lcov --output-path lcov.info

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: lcov.info
          fail_ci_if_error: true
          # token omitted — authenticated via OIDC (id-token: write)
