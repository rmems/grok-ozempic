name: Codecov Coverage

on:
  pull_request:
    branches: [main, refactor-tests-docs]
  push:
    branches:
      - main
      - narrow-crest
      - refactor-tests-docs

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write          # Enables Codecov OIDC (tokenless)

jobs:
  coverage:
    name: Codecov Upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@0a3c5d0c0c4e0e0e0e0e0e0e0e0e0e0e0e0e0e0e # cargo-llvm-cov v0.6.0 (pinned SHA)

      - name: Generate Code Coverage
        run: cargo llvm-cov --all-targets --all-features --workspace --lcov --output-path lcov.info

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@84508663e9888b0e0e0e0e0e0e0e0e0e0e0e0e0e # v4.1.0 (pinned SHA)
        with:
          files: lcov.info
          fail_ci_if_error: true
          # token omitted — authenticated via OIDC (id-token: write)
